name: Documentation
description: Report an issue related to the LangGraph documentation.
title: <Please write a comprehensive title>"
labels: [langgraph]

body:
- type: dropdown
  attributes:
    label: "Type of issue"
    description: "What type of documentation issue are you reporting?"
    options:
      - issue
      - request for content
      - question
      - other
    default: 0
  validations:
    required: true
- type: textarea
  attributes:
    label: "Description"
    description: >
      Please describe your issue, content request, or question in detail.
      If reporting an issue with current documentation, please include a reference
      to the specific document/code you're referring to.
  validations:
    required: true
